version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fondoapp-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=[DB_PASSWORD]
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "[DB_PASSWORD]", "-C", "-Q", "SELECT 1" ]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 3s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fondoapp-rabbitmq
    hostname: rabbitmq-broker
    environment:
      - RABBITMQ_DEFAULT_USER=fondoApp
      - RABBITMQ_DEFAULT_PASS=[RABBITMQ_PASSWORD]
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      retries: 5
      start_period: 15s
      timeout: 5s

  backend:
    build: ./backend
    container_name: fondoapp-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=sql-server
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=[DB_PASSWORD]
      - DB_NAME=FondoAppDB
      - RABBITMQ_URL=amqp://fondoApp:[RABBITMQ_PASSWORD]@rabbitmq:5672
      - JWT_SECRET=[JWT_SECRET]
    depends_on:
      sql-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fondoapp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  sqlvolume:
